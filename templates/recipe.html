<!DOCTYPE html>
<html>
<head>
  <title>{{ recipe.strMeal }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="recipe-container">
    <h1>{{ recipe.strMeal }}</h1>
    <img src="{{ recipe.strMealThumb }}" alt="{{ recipe.strMeal }}">

    <div class="info">
      <p><strong>Category:</strong> {{ recipe.strCategory }}</p>
      <p><strong>Area:</strong> {{ recipe.strArea }}</p>
    </div>

    <h3>Instructions</h3>
    <p class="instructions">{{ recipe.strInstructions }}</p>

    <h3>Watch Recipe Video:</h3>
    {% if recipe.strYoutube %}
      <iframe width="100%" height="315" src="https://www.youtube.com/embed/{{ recipe.strYoutube.split('=')[-1] }}" frameborder="0" allowfullscreen></iframe>
    {% else %}
      <p>No video available.</p>
    {% endif %}

    <a class="back-btn" href="/">← Back to Search</a>
  </div>
</body>
</html>
